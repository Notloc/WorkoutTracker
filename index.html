<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#14161a" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="css/style.css" />
  <title>Lift Log</title>
</head>
<body>
  <div id="app"></div>

  <div id="restTimer" class="rest-timer hidden">
    <div class="rest-timer-inner">
      <span id="restLabel" class="rest-label">Rest</span>
      <span id="restClock" class="rest-clock">1:30</span>
      <button id="restAddBtn" class="rest-btn" type="button">+15s</button>
      <button id="restSkipBtn" class="rest-btn rest-skip" type="button">Skip</button>
    </div>
  </div>

  <nav id="tabbar" class="tabbar">
    <button class="tab-btn active" data-tab="today" type="button">
      <span class="tab-icon">●</span><span>Today</span>
    </button>
    <button class="tab-btn" data-tab="history" type="button">
      <span class="tab-icon">▤</span><span>History</span>
    </button>
    <button class="tab-btn" data-tab="settings" type="button">
      <span class="tab-icon">⚙</span><span>Plan &amp; Settings</span>
    </button>
  </nav>

  <script src="js/plan.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
